<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="36" cy="36" r="26" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Shield body -->
  <path d="M40 10 L62 20 L62 42 C62 54 40 70 40 70 C40 70 18 54 18 42 L18 20 Z"
        fill="#0e1118" stroke="url(#grad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner shield fill -->
  <path d="M40 16 L57 24.5 L57 42 C57 51 40 64 40 64 C40 64 23 51 23 42 L23 24.5 Z"
        fill="url(#glow)"/>

  <!-- Magnifying glass circle -->
  <circle cx="37" cy="37" r="10" stroke="url(#grad)" stroke-width="2.5" fill="none"/>

  <!-- Magnifying glass handle -->
  <line x1="44" y1="44" x2="52" y2="52" stroke="url(#grad)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Cross/check lines inside lens (scan lines) -->
  <line x1="32" y1="37" x2="42" y2="37" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="32" x2="37" y2="42" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Handle dot cap -->
  <circle cx="52" cy="52" r="2" fill="url(#grad)"/>
</svg>
